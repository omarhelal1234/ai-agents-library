# Railway config for the WhatsApp bridge.
# After importing the repo on Railway:
#   1) Set the Root Directory to whatsapp/bridge
#   2) Add a Volume mounted at /data (the wweb session lives here)
#   3) Set env vars: BRIDGE_SECRET, SUPABASE_WEBHOOK_URL,
#      SUPABASE_SERVICE_ROLE, OWNER_WA_ID (optional)

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "node src/index.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[deploy.healthcheck]
path = "/health"
timeout = 30
